<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 93%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Login</h2>

        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <a href="register.html">Don't have an Account?</a>

    </div>

<script>

function login() {

    fetch("http://127.0.0.1:8000/login", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })

    })

    .then(res => res.json())

    .then(data => {

        if (data.access_token) {

            localStorage.setItem("token", data.access_token);

            alert("Login Successful");

            window.location = "dashboard.html";

        } 
        else {

            alert("Invalid Email or Password");

        }

    })

    .catch(error => {

        alert("Server Error");

        console.log(error);

    });

}

</script>

</body>
</html>
